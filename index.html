<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Department Forms</title>
    <link rel="stylesheet" href="styles.css?v=20260630-1" />
  </head>
  <body>
    <main class="app-shell portal-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" data-i18n="Daily entry portal">Daily entry portal</p>
          <h1 data-i18n="Choose your department form">Choose your department form</h1>
        </div>
        <div class="date-panel">
          <label>
            <span data-i18n="Language">Language</span>
            <select id="languageSelect">
              <option value="en">English</option>
              <option value="he">עברית</option>
            </select>
          </label>
        </div>
      </header>

      <section class="portal-panel">
        <p data-i18n="Open your department form and submit today's numbers.">
          Open your department form and submit today's numbers.
        </p>
        <div class="portal-grid" aria-label="Department form links">
          <a id="newSalesFormLink" href="form.html?department=newSales">
            <strong data-i18n="Sales Department 1">Sales Department 1</strong>
            <span data-i18n="Daily Form">Daily Form</span>
          </a>
          <a id="newSales2FormLink" href="form.html?department=newSales2">
            <strong data-i18n="Sales Department 2">Sales Department 2</strong>
            <span data-i18n="Daily Form">Daily Form</span>
          </a>
          <a href="form.html?department=renewals">
            <strong data-i18n="Renewal Sales">Renewal Sales</strong>
            <span data-i18n="Daily Form">Daily Form</span>
          </a>
          <a href="form.html?department=service">
            <strong data-i18n="Customer Service">Customer Service</strong>
            <span data-i18n="Daily Form">Daily Form</span>
          </a>
          <a href="form.html?department=collection">
            <strong data-i18n="Collection">Collection</strong>
            <span data-i18n="Daily Form">Daily Form</span>
          </a>
          <a href="form.html?department=hr">
            <strong data-i18n="HR">HR</strong>
            <span data-i18n="Daily Form">Daily Form</span>
          </a>
          <a href="form.html?department=businessDevelopment">
            <strong data-i18n="Business Development">Business Development</strong>
            <span data-i18n="Daily Form">Daily Form</span>
          </a>
        </div>
      </section>
    </main>

    <script src="config.js?v=20260625-2"></script>
    <script src="portal.js?v=20260625-2"></script>
  </body>
</html>
